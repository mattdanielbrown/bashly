:root_options:
  with_version: false
  command:
    name: cli
    flags:
    - long: --force
      short: -f
    - long: --verbose

:source_resolution:
  command:
    name: cli
    commands:
    - name: upload
      completions: [<file>, README.md]
      args:
      - name: source
        completions: [<directory>, README.md, $(git branch), +literal]
      - name: target
      - name: extra
      flags:
      - long: --user
        short: -u
        arg: user
        completions: [<user>]
      - long: --tag
        arg: tag

:aliases_and_global_flags:
  command:
    name: cli
    flags:
    - long: --debug
    commands:
    - name: images
      alias: img
      flags:
      - long: --verbose
      commands:
      - name: list
        alias: ls
        flags:
        - long: --env
          arg: env
          allowed: [prod, dev]

:default_command:
  command:
    name: cli
    commands:
    - name: get
      default: true
      args:
      - name: package
        completions: [hello, world]
      flags:
      - long: --source
        arg: source
        completions: [local, remote]

:token_collisions:
  command:
    name: cli
    flags:
    - long: --file
      allowed: [one]
    - long: --root-file
      allowed: [two]
    - long: --root-file-2
      allowed: [three]
    args:
    - name: file
      allowed: [four]
